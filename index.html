<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand-Controlled Drone Synthesizer</title>
    <meta name="description" content="A live performance drone instrument you control with your hands. No keyboard, no mouse — just gestures.">

    <!-- Open Graph -->
    <!-- TODO: update og:url and og:image to absolute GitHub Pages URLs once thumbnail is captured -->
    <meta property="og:title" content="Hand-Controlled Drone Synthesizer">
    <meta property="og:description" content="A live performance drone instrument you control with your hands. Real-time ASCII visuals driven by WebGL. Audio synthesis via Tone.js. Hand tracking via MediaPipe.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="">
    <meta property="og:image" content="thumbnail.png">

    <!-- Twitter -->
    <!-- TODO: update twitter:image to absolute GitHub Pages URL once thumbnail is captured -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Hand-Controlled Drone Synthesizer">
    <meta name="twitter:description" content="A live performance drone instrument you control with your hands. Real-time ASCII visuals driven by WebGL. Audio synthesis via Tone.js. Hand tracking via MediaPipe.">
    <meta name="twitter:image" content="thumbnail.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #video {
            display: none;
        }
        #canvas {
            display: none;
        }
        #ascii-output {
            display: none;
        }
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        #status {
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            border-radius: 5px;
            border: 2px solid #0f0;
            z-index: 1000;
            min-width: 280px;
            display: none;
        }
        #log {
            color: #fff;
            font-family: monospace;
            font-size: 11px;
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            z-index: 1000;
            max-width: 350px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        #status.debug-visible, #log.debug-visible {
            display: block;
        }
        .log-entry {
            margin: 3px 0;
            padding-bottom: 3px;
            border-bottom: 1px solid #222;
        }
        .log-entry.error { color: #f44; }
        .log-entry.success { color: #4f4; }
        .log-entry.info { color: #4ff; }

        /* Key selection overlay */
        #key-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1500;
            pointer-events: none;
        }

        /* Startup overlay */
        #startup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: pointer;
            transition: opacity 0.5s ease-out;
        }
        #startup-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .startup-title {
            font-family: 'Courier New', monospace;
            font-size: 72px;
            font-weight: bold;
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
        }
        .startup-title span {
            display: inline-block;
            animation: float 2s ease-in-out infinite;
        }
        .startup-subtitle {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            color: #888;
            text-align: center;
            max-width: 500px;
            line-height: 1.6;
        }
        .startup-subtitle span {
            display: inline-block;
            animation: float 2.5s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-3px) rotate(0.5deg); }
            50% { transform: translateY(2px) rotate(-0.5deg); }
            75% { transform: translateY(-2px) rotate(0.3deg); }
        }

        /* Help menu */
        #help-icon {
            position: fixed;
            top: 10px;
            left: 10px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #0f0;
            border-radius: 5px;
            color: #fff;
            font-family: monospace;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            user-select: none;
        }
        #help-icon:hover {
            border-color: #4f4;
        }
        #help-panel {
            position: fixed;
            top: 60px;
            left: 10px;
            width: 320px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #0f0;
            border-radius: 5px;
            padding: 15px;
            color: #fff;
            font-family: monospace;
            z-index: 1000;
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
        }
        #help-panel.hidden {
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
        }
        #help-panel.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .help-title {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }
        .help-note {
            font-size: 11px;
            color: #c93;
            font-style: italic;
            margin-bottom: 12px;
        }
        .help-section {
            margin-bottom: 12px;
        }
        .help-section-title {
            font-size: 12px;
            color: #4ff;
            margin-bottom: 4px;
        }
        .help-item {
            font-size: 11px;
            color: #4ff;
            margin-left: 12px;
            margin-bottom: 2px;
        }
        .help-item-desc {
            color: #888;
        }

        /* Key indicator */
        #key-indicator {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #0f0;
            border-radius: 5px;
            color: #fff;
            font-family: monospace;
            font-size: 18px;
            padding: 6px 12px;
            z-index: 1000;
            display: none;
        }
    </style>
    <script>
        // Debug mode - set to true to show hand detection status and message log
        window.DEBUG = false;

        // Apply debug visibility once DOM is ready
        function applyDebugVisibility() {
            const statusEl = document.getElementById('status');
            const logEl = document.getElementById('log');
            if (window.DEBUG) {
                if (statusEl) statusEl.classList.add('debug-visible');
                if (logEl) logEl.classList.add('debug-visible');
            }
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', applyDebugVisibility);
        } else {
            applyDebugVisibility();
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <video id="video" width="640" height="480" autoplay playsinline></video>
    <canvas id="canvas" width="120" height="70"></canvas>
    <canvas id="webgl-canvas"></canvas>
    <div id="ascii-output"></div>
    <div id="status">Initializing...</div>
    <div id="log">
        <div class="log-entry info">Waiting for camera...</div>
    </div>

    <div id="startup-overlay">
        <div class="startup-title"></div>
        <div class="startup-subtitle"></div>
    </div>

    <div id="help-icon">?</div>
    <div id="help-panel" class="hidden"></div>

    <div id="key-indicator"></div>

    <canvas id="key-overlay"></canvas>

    <script src="handDetection.js"></script>
    <script src="iosSilentModeUnlock.js"></script>
    <script src="keyOverlay.js"></script>
    <script src="helpMenu.js"></script>
    <script src="audioEngine.js"></script>
    <script src="textureAtlasGenerator.js"></script>
    <script src="asciiRendererWebGL.js"></script>
    <script src="main.js"></script>
</body>
</html>
